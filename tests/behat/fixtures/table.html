<!DOCTYPE html>
<html>
<head><title>Table Fixtures</title></head>
<body>

<h2>Sorted ascending by Name</h2>
<table class="table-asc">
  <thead>
    <tr>
      <th>Name</th>
      <th>Category</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Alpha item</td>
      <td>Type A</td>
      <td>Active</td>
    </tr>
    <tr>
      <td>Beta item</td>
      <td>Type B</td>
      <td>Inactive</td>
    </tr>
    <tr>
      <td>Gamma item</td>
      <td>Type A</td>
      <td>Active</td>
    </tr>
  </tbody>
</table>

<h2>Sorted descending by Name</h2>
<table class="table-desc">
  <thead>
    <tr>
      <th>Name</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Gamma item</td>
      <td>Active</td>
    </tr>
    <tr>
      <td>Beta item</td>
      <td>Inactive</td>
    </tr>
    <tr>
      <td>Alpha item</td>
      <td>Active</td>
    </tr>
  </tbody>
</table>

<h2>Empty table</h2>
<table class="table-empty">
  <thead>
    <tr>
      <th>Name</th>
      <th>Status</th>
    </tr>
  </thead>
  <tbody>
  </tbody>
</table>

<h2>Single row table</h2>
<table class="table-single">
  <thead>
    <tr>
      <th>Name</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Only item</td>
    </tr>
  </tbody>
</table>

</body>
</html>
