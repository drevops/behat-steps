<!DOCTYPE html>
<html>
<head>
<title>jQuery UI Modal</title>
<style>
  .ui-dialog { border: 1px solid #ccc; padding: 10px; display: block; }
  .ui-dialog-titlebar { display: flex; justify-content: space-between; }
  .ui-dialog-titlebar-close { cursor: pointer; }
</style>
</head>
<body>
<div class="ui-dialog">
  <div class="ui-dialog-titlebar">
    <span>Modal Title</span>
    <button class="ui-dialog-titlebar-close">Close</button>
  </div>
  <div class="ui-dialog-content">
    <p>jQuery UI modal content</p>
    <button class="btn-save">Save</button>
    <a href="#" class="link-cancel">Cancel</a>
  </div>
</div>
</body>
</html>
